<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floppy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Comic Sans MS', sans-serif;
  }
  canvas {
    border: 3px solid #16213e;
    box-shadow: 0 0 30px rgba(0, 200, 255, 0.3);
    border-radius: 4px;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 400;
const H = 600;
canvas.width = W;
canvas.height = H;

const GRAVITY = 0.45;
const FLAP = -8.5;
const PIPE_SPEED = 2.8;
const PIPE_WIDTH = 60;
const PIPE_GAP = 155;
const PIPE_INTERVAL = 1600; // ms

let state = 'idle'; // idle | playing | dead
let score = 0;
let bestScore = 0;
let frameId;
let lastPipeTime = 0;
let pipes = [];
let particles = [];
let groundOffset = 0;

const bird = {
  x: 90,
  y: H / 2,
  vy: 0,
  radius: 14,
  angle: 0,
  reset() {
    this.x = 90;
    this.y = H / 2;
    this.vy = 0;
    this.angle = 0;
  }
};

// Sky gradient colors
const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
skyGrad.addColorStop(0, '#87CEEB');
skyGrad.addColorStop(0.7, '#b0e0f5');
skyGrad.addColorStop(1, '#c8f0a0');

// Cloud positions
const clouds = [
  { x: 60, y: 80, scale: 1 },
  { x: 220, y: 50, scale: 0.7 },
  { x: 320, y: 110, scale: 0.85 },
];

function drawBackground(dt) {
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Move clouds slowly
  if (state === 'playing') {
    clouds.forEach(c => { c.x -= 0.3; if (c.x < -80) c.x = W + 80; });
  }
  clouds.forEach(c => drawCloud(c.x, c.y, c.scale));
}

function drawCloud(x, y, s) {
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.arc(x, y, 22 * s, 0, Math.PI * 2);
  ctx.arc(x + 20 * s, y - 8 * s, 16 * s, 0, Math.PI * 2);
  ctx.arc(x + 38 * s, y, 20 * s, 0, Math.PI * 2);
  ctx.arc(x + 18 * s, y + 8 * s, 14 * s, 0, Math.PI * 2);
  ctx.fill();
}

function drawGround() {
  // Dirt
  ctx.fillStyle = '#c8a96e';
  ctx.fillRect(0, H - 30, W, 30);
  // Grass strip
  ctx.fillStyle = '#5d9e32';
  ctx.fillRect(0, H - 30, W, 8);

  // Scrolling tiles
  if (state === 'playing') groundOffset = (groundOffset + PIPE_SPEED) % 40;
  ctx.fillStyle = '#a8863a';
  for (let x = -groundOffset; x < W; x += 40) {
    ctx.strokeStyle = '#b8966a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, H - 30);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
}

function drawPipe(pipe) {
  const capH = 24;
  const capW = PIPE_WIDTH + 10;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(pipe.x + 4, 0, PIPE_WIDTH, pipe.top);
  ctx.fillRect(pipe.x + 4, pipe.top + PIPE_GAP, PIPE_WIDTH, H - pipe.top - PIPE_GAP - 30);

  // Body gradient
  const pg = ctx.createLinearGradient(pipe.x, 0, pipe.x + PIPE_WIDTH, 0);
  pg.addColorStop(0, '#3daa3d');
  pg.addColorStop(0.4, '#5dc85d');
  pg.addColorStop(1, '#2d8a2d');

  ctx.fillStyle = pg;
  // Top pipe body
  ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.top - capH);
  // Bottom pipe body
  ctx.fillRect(pipe.x, pipe.top + PIPE_GAP + capH, PIPE_WIDTH, H - pipe.top - PIPE_GAP - capH - 30);

  // Caps
  const capGrad = ctx.createLinearGradient(pipe.x - 5, 0, pipe.x + capW, 0);
  capGrad.addColorStop(0, '#2daa2d');
  capGrad.addColorStop(0.4, '#60d060');
  capGrad.addColorStop(1, '#1d8a1d');
  ctx.fillStyle = capGrad;
  ctx.fillRect(pipe.x - 5, pipe.top - capH, capW, capH);
  ctx.fillRect(pipe.x - 5, pipe.top + PIPE_GAP, capW, capH);

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(pipe.x + 5, 0, 10, pipe.top - capH);
  ctx.fillRect(pipe.x + 5, pipe.top + PIPE_GAP + capH, 10, H - pipe.top - PIPE_GAP - capH - 30);
}

function drawBird() {
  const b = bird;
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(b.angle);

  // Body shadow
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.beginPath();
  ctx.ellipse(3, 3, b.radius, b.radius * 0.85, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  const bodyGrad = ctx.createRadialGradient(-4, -4, 2, 0, 0, b.radius);
  bodyGrad.addColorStop(0, '#ffe066');
  bodyGrad.addColorStop(0.6, '#f5a623');
  bodyGrad.addColorStop(1, '#e07b00');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0, 0, b.radius, b.radius * 0.85, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing
  ctx.fillStyle = '#e8920a';
  ctx.beginPath();
  ctx.ellipse(-3, 3, 9, 5, -0.4, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(6, -4, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(7.5, -4, 2.5, 0, Math.PI * 2);
  ctx.fill();
  // Eye shine
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(8.5, -5, 1, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#ff6b00';
  ctx.beginPath();
  ctx.moveTo(10, -1);
  ctx.lineTo(18, 1);
  ctx.lineTo(10, 4);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= 1;
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function spawnDeathParticles() {
  const colors = ['#f5a623', '#ffe066', '#ff6b00', '#ffffff', '#ffcc00'];
  for (let i = 0; i < 20; i++) {
    const angle = (Math.PI * 2 * i) / 20 + Math.random() * 0.5;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x: bird.x, y: bird.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      size: 2 + Math.random() * 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 30 + Math.random() * 20,
      maxLife: 50,
    });
  }
}

function drawHUD() {
  if (state === 'playing' || state === 'dead') {
    ctx.fillStyle = 'white';
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 3;
    ctx.font = 'bold 42px Comic Sans MS';
    ctx.textAlign = 'center';
    ctx.strokeText(score, W / 2, 80);
    ctx.fillText(score, W / 2, 80);
  }
}

function drawIdleScreen() {
  // Panel
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  roundRect(W / 2 - 130, H / 2 - 90, 260, 170, 16);
  ctx.fill();

  ctx.fillStyle = '#ffe066';
  ctx.font = 'bold 46px Comic Sans MS';
  ctx.textAlign = 'center';
  ctx.fillText('FLOPPY BIRD', W / 2, H / 2 - 40);

  ctx.fillStyle = 'white';
  ctx.font = '18px Comic Sans MS';
  ctx.fillText('Press SPACE or tap to flap', W / 2, H / 2 + 10);

  if (bestScore > 0) {
    ctx.fillStyle = '#ffe066';
    ctx.font = '16px Comic Sans MS';
    ctx.fillText(`Best: ${bestScore}`, W / 2, H / 2 + 45);
  }
}

function drawDeadScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(W / 2 - 130, H / 2 - 110, 260, 210, 16);
  ctx.fill();

  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 38px Comic Sans MS';
  ctx.textAlign = 'center';
  ctx.fillText('YOU LOST BUM', W / 2, H / 2 - 58);

  ctx.fillStyle = 'white';
  ctx.font = '20px Comic Sans MS';
  ctx.fillText(`Score: ${score}`, W / 2, H / 2 - 15);
  ctx.fillText(`Best: ${bestScore}`, W / 2, H / 2 + 20);

  ctx.fillStyle = '#ffe066';
  ctx.font = '16px Comic Sans MS';
  ctx.fillText('Press SPACE or tap to retry', W / 2, H / 2 + 65);
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function addPipe(now) {
  const minTop = 60;
  const maxTop = H - 30 - PIPE_GAP - 60;
  const top = minTop + Math.random() * (maxTop - minTop);
  pipes.push({ x: W + 10, top, scored: false });
  lastPipeTime = now;
}

function checkCollision() {
  const b = bird;
  if (b.y + b.radius > H - 30 || b.y - b.radius < 0) return true;

  for (const p of pipes) {
    const bLeft = b.x - b.radius + 4;
    const bRight = b.x + b.radius - 4;
    const bTop = b.y - b.radius + 4;
    const bBottom = b.y + b.radius - 4;

    if (bRight > p.x - 5 && bLeft < p.x + PIPE_WIDTH + 5) {
      if (bTop < p.top || bBottom > p.top + PIPE_GAP) return true;
    }
  }
  return false;
}

function flap() {
  if (state === 'idle') {
    state = 'playing';
    pipes = [];
    score = 0;
    particles = [];
    bird.reset();
    lastPipeTime = performance.now() - PIPE_INTERVAL + 800;
  } else if (state === 'dead') {
    state = 'idle';
    return;
  }
  if (state === 'playing') {
    bird.vy = FLAP;
  }
}

let lastTime = 0;
function loop(now) {
  frameId = requestAnimationFrame(loop);
  const dt = now - lastTime;
  lastTime = now;

  drawBackground(dt);

  // Update & draw pipes
  pipes.forEach(p => {
    if (state === 'playing') p.x -= PIPE_SPEED;
    drawPipe(p);
  });
  pipes = pipes.filter(p => p.x + PIPE_WIDTH > -20);

  if (state === 'playing') {
    // Spawn pipes
    if (now - lastPipeTime > PIPE_INTERVAL) addPipe(now);

    // Score
    pipes.forEach(p => {
      if (!p.scored && p.x + PIPE_WIDTH < bird.x) {
        p.scored = true;
        score++;
        bestScore = Math.max(bestScore, score);
      }
    });

    // Physics
    bird.vy += GRAVITY;
    bird.y += bird.vy;
    bird.angle = Math.min(Math.PI / 2, Math.max(-0.4, bird.vy * 0.06));

    if (checkCollision()) {
      state = 'dead';
      spawnDeathParticles();
    }
  } else if (state === 'idle') {
    // Bob bird on idle screen
    bird.y = H / 2 + Math.sin(now * 0.003) * 10;
    bird.angle = Math.sin(now * 0.003) * 0.15;
  }

  drawGround();
  drawBird();
  drawParticles();
  drawHUD();

  if (state === 'idle') drawIdleScreen();
  if (state === 'dead') drawDeadScreen();
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); flap(); }
});
canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });

requestAnimationFrame(loop);
</script>
</body>
</html>
